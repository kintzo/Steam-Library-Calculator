version: "3.9"
services:
  steam-library-calculator:
    build:
      context: .
      dockerfile: Containerfile
    image: steam-library-calculator:latest
    container_name: steam-library-calculator
    ports:
      - "3000:3000"
    expose:
      - "3000"
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: docker.io/nginx:stable-alpine
    container_name: steam-library-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - steam-library-calculator
    restart: unless-stopped
